<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZAP48 - Formulário de Registro</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root { --primary: #8ACE00; --black: #000000; --bg: #f4f4f4; --border: 2px solid #000; --shadow: 4px 4px 0px #000; --radius: 16px; }
    * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
    body { background-color: var(--bg); color: var(--black); font-family: 'Roboto', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
    h1, h2, h3, .font-head { font-family: 'Montserrat', sans-serif; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; }

    .header-logo { font-size: 2rem; font-weight: 900; font-style: italic; margin-bottom: 20px; text-align: center; }
    .header-logo span { color: var(--primary); }
    .form-card { background: #fff; border: var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 25px 20px; width: 100%; max-width: 450px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 0.75rem; font-weight: 900; color: #555; text-transform: uppercase; margin-bottom: 5px; }
    input[type="text"], select, textarea { width: 100%; padding: 12px; border: var(--border); border-radius: 8px; font-family: inherit; font-weight: 700; font-size: 1rem; background: #fafafa; transition: 0.2s; }
    input[type="text"]:focus, select:focus, textarea:focus { background: #fff; border-color: var(--primary); }

    .photo-upload-area { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
    .photo-preview { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); background: #eee; object-fit: cover; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #aaa; overflow: hidden; }
    .photo-preview img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .btn-upload { flex: 1; background: #000; color: #fff; border: var(--border); padding: 10px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
    .upload-status { font-size: 0.7rem; font-weight: 900; color: var(--primary); margin-top: 5px; }

    .btn-submit { background: var(--primary); color: #000; border: var(--border); padding: 15px; border-radius: 8px; font-weight: 900; font-size: 1.1rem; width: 100%; cursor: pointer; box-shadow: 2px 2px 0 #000; text-transform: uppercase; margin-top: 10px; transition: transform 0.1s; }
    .btn-submit:active { transform: scale(0.98); box-shadow: 0 0 0 #000; }

    #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 30000; display: none; justify-content: center; align-items: center; flex-direction: column; }
    .spinner { border: 6px solid #f3f3f3; border-top: 6px solid var(--primary); border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-text { font-family: 'Montserrat'; font-weight: 900; color: #000; text-transform: uppercase; font-size: 1.2rem; }
    .success-box { display: none; text-align: center; padding: 30px 10px; }
    .success-box i { font-size: 4rem; color: var(--primary); margin-bottom: 15px; }
  </style>
</head>
<body>

  <div id="loading-overlay"><div class="spinner"></div><div class="loading-text" id="loading-text">Enviando...</div></div>

  <div class="header-logo">ZAP<span>48</span></div>

  <div class="form-card" id="register-card">
    <h2 style="text-align: center; margin-bottom: 20px; font-size: 1.3rem;">Registro de Membro</h2>
    
    <form id="registro-form" onsubmit="submitForm(event)">
      <div class="form-group">
        <label>Foto de Perfil</label>
        <div class="photo-upload-area">
          <div class="photo-preview" id="photo-preview-circle"><i class="fas fa-camera" id="photo-icon"></i><img id="p-preview-img" src=""></div>
          <div>
            <input type="file" id="f-photo-file" style="display:none" accept="image/*" onchange="handleImageUpload(this)">
            <button type="button" class="btn-upload" onclick="document.getElementById('f-photo-file').click()"><i class="fas fa-upload"></i> Escolher Foto</button>
            <div id="upload-status" class="upload-status"></div>
            <input type="hidden" id="f-photo-url" required>
          </div>
        </div>
      </div>

      <div class="form-group"><label>Nome Artístico</label><input type="text" id="f-nome" placeholder="Digite seu nome" required></div>

      <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex: 1;">
          <label>Time</label>
          <select id="f-time" required>
            <option value="" disabled selected>Selecione...</option>
            <option value="Team Kenkyuusei/SEEDs">Team Kenkyuusei/SEEDs</option>
            <option value="Team Z">Team Z</option>
            <option value="Team AII">Team AII</option>
            <option value="Team P">Team P</option>
          </select>
        </div>

        <div class="form-group" style="flex: 1;">
          <label>Geração</label>
          <select id="f-geracao" required>
            <option value="" disabled selected>Selecione...</option>
            <option value="1ª Geração">1ª Geração</option>
            <option value="2ª Geração">2ª Geração</option>
            <option value="3ª Geração">3ª Geração</option>
            <option value="4ª Geração">4ª Geração</option>
            <option value="5ª Geração">5ª Geração</option>
            <option value="6ª Geração">6ª Geração</option>
            <option value="7ª Geração">7ª Geração</option>
          </select>
        </div>
      </div>

      <div class="form-group"><label>Biografia / Perfil</label><textarea id="f-bio" rows="4" placeholder="Escreva um pouco sobre você..."></textarea></div>
      <button type="submit" class="btn-submit">ENVIAR CADASTRO</button>
    </form>
  </div>

  <div class="form-card success-box" id="success-card">
      <i class="fas fa-check-circle"></i><h2>Cadastro Concluído!</h2>
      <p style="color: #666; margin-top: 10px; font-weight: 500;">Você já foi adicionada ao banco de dados do ZAP48.</p>
      <button class="btn-upload" style="margin-top: 20px; width: 100%;" onclick="location.reload()">Cadastrar Outra</button>
  </div>

  <script>
    const SUPABASE_URL = "https://iooyygtaosshxygnhlco.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlvb3l5Z3Rhb3NzaHh5Z25obGNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwMDEyNTUsImV4cCI6MjA4NDU3NzI1NX0.gfcVtNgn3g1gnFVrtaIqzkWxajYiV_KbtycYsE9OZ0Y";
    const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const IMGBB_KEY = "81f7ca81cf22d739de576bd1dac7dcc2";

    function showLoading(show, text="Enviando...") { document.getElementById('loading-text').innerText = text; document.getElementById('loading-overlay').style.display = show ? "flex" : "none"; }

    async function handleImageUpload(input) {
        const file = input.files[0]; if (!file) return;
        document.getElementById('upload-status').innerText = "⏳ Carregando imagem..."; document.getElementById('upload-status').style.color = "#ff9800";
        try {
            const base64 = await new Promise((resolve, reject) => { const reader = new FileReader(); reader.onload = () => resolve(reader.result); reader.onerror = error => reject(error); reader.readAsDataURL(file); });
            const formData = new FormData(); formData.append("key", IMGBB_KEY); formData.append("image", String(base64).split(",")[1]);
            const res = await fetch("https://api.imgbb.com/1/upload", { method: "POST", body: formData }); const data = await res.json();
            if(data.success) {
                const imageUrl = data.data.url; document.getElementById('f-photo-url').value = imageUrl;
                document.getElementById('photo-icon').style.display = "none";
                const imgEl = document.getElementById('p-preview-img'); imgEl.src = imageUrl; imgEl.style.display = "block";
                document.getElementById('upload-status').innerText = "✅ Foto pronta!"; document.getElementById('upload-status').style.color = "var(--primary)";
            } else throw new Error("Falha na API ImgBB");
        } catch(err) { document.getElementById('upload-status').innerText = "❌ Erro ao enviar foto."; document.getElementById('upload-status').style.color = "red"; }
    }

    async function submitForm(event) {
        event.preventDefault();
        const photoUrl = document.getElementById('f-photo-url').value;
        if(!photoUrl) { alert("Por favor, faça o upload de uma foto de perfil primeiro!"); return; }
        showLoading(true, "Registrando membro...");
        const payload = {
            Nome: document.getElementById('f-nome').value.trim(), Time: document.getElementById('f-time').value,
            Geracao: document.getElementById('f-geracao').value, Status: "Ativa", Foto: photoUrl, Perfil: document.getElementById('f-bio').value.trim(),
            Participacoes: "[]", Historico_Times: "[]"
        };
        try { const { error } = await _sb.from("Membros").insert([payload]); if (error) throw error;
            document.getElementById('register-card').style.display = "none"; document.getElementById('success-card').style.display = "block";
        } catch (error) { alert("Erro ao enviar cadastro: " + error.message); }
        showLoading(false);
    }
  </script>
</body>
</html>
